    <script>
        lucide.createIcons();
        let lastClick = 0;
        let adminPass = "";
        let allFiles = {};
        let filteredFiles = {};
        let currentPage = 1;
        let selectedCodes = new Set();
        const PAGE_SIZE = 500;

        function handleFooterClick() {
            const now = Date.now();
            if (now - lastClick < 500 && lastClick !== 0) {
                document.getElementById('admin-modal').style.display='flex';
                lastClick = 0;
            } else { lastClick = now; }
        }
        function closeAdmin() { document.getElementById('admin-modal').style.display='none'; }

        async function loginAdmin() {
            const pass = document.getElementById('admin-pass').value;
            const errorEl = document.getElementById('login-error');
            errorEl.style.display = 'none';
            try {
                const res = await fetch('/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pass }) });
                if (res.ok) {
                    adminPass = pass;
                    document.getElementById('admin-login-section').style.display = 'none';
                    document.getElementById('admin-panel-section').style.display = 'flex';
                    document.getElementById('admin-title').innerText = 'Admin Dashboard';
                    loadAdminData();
                } else {
                    errorEl.style.display = 'block';
                    document.getElementById('admin-pass').style.borderColor = '#ff3e00';
                }
            } catch (e) { alert('Connection error'); }
        }

        async function loadAdminData() {
            const res = await fetch(`/admin/data?password=${encodeURIComponent(adminPass)}`);
            const data = await res.json();
            allFiles = data.files;
            filteredFiles = Object.assign({}, allFiles);
            document.getElementById('stat-files').innerText = data.total_files;
            document.getElementById('stat-size').innerText = data.total_size;
            currentPage = 1;
            selectedCodes.clear();
            renderFileList();
        }

        function renderFileList() {
            const tbody = document.getElementById('file-tbody');
            const baseUrl = window.location.origin;
            const entries = Object.entries(filteredFiles);
            const total = entries.length;
            const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
            
            const pagCtrl = document.getElementById('pagination-ctrl');
            pagCtrl.style.display = total > PAGE_SIZE ? 'flex' : 'none';
            
            document.getElementById('page-info').innerText = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;

            tbody.innerHTML = '';
            
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageEntries = entries.slice(start, end);

            // Periksa jika semua fail di page ini ada dalam selectedCodes
            let allPageChecked = pageEntries.length > 0;
            for (const [code, info] of pageEntries) {
                if (!selectedCodes.has(code)) { allPageChecked = false; break; }
            }
            document.getElementById('select-all').checked = allPageChecked;

            for (const [code, info] of pageEntries) {
                const tr = document.createElement('tr');
                const isChecked = selectedCodes.has(code) ? 'checked' : '';
                tr.innerHTML = `
                    <td><input type="checkbox" class="file-check" value="${code}" ${isChecked} onclick="toggleFileSelection('${code}')"></td>
                    <td style="max-width:150px; overflow:hidden; text-overflow:ellipsis;" title="${info.name}">${info.name}</td>
                    <td><code>${code.split('_')[0]}</code></td>
                    <td>${(info.size / 1024 / 1024).toFixed(2)} MB</td>
                    <td><a href="${baseUrl}/d/${code}" target="_blank" style="color:var(--accent); font-weight:700; text-decoration:none;">OPEN</a></td>
                    <td style="white-space:nowrap;">${info.expires_human || info.expires}</td>
                `;
                tbody.appendChild(tr);
            }
            updateSelectedCount();
            lucide.createIcons();
        }

        function toggleFileSelection(code) {
            if (selectedCodes.has(code)) {
                selectedCodes.delete(code);
            } else {
                selectedCodes.add(code);
            }
            updateSelectedCount();
            
            // Kemaskini Master Checkbox UI
            const pageChecks = document.querySelectorAll('.file-check');
            const pageChecked = document.querySelectorAll('.file-check:checked');
            document.getElementById('select-all').checked = (pageChecks.length === pageChecked.length && pageChecks.length > 0);
        }

        function toggleSelectAll() {
            const master = document.getElementById('select-all');
            const entries = Object.entries(filteredFiles);
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageEntries = entries.slice(start, end);

            for (const [code, info] of pageEntries) {
                if (master.checked) {
                    selectedCodes.add(code);
                } else {
                    selectedCodes.delete(code);
                }
            }
            renderFileList();
        }

        function selectGlobal(val) {
            if (val) {
                Object.keys(filteredFiles).forEach(code => selectedCodes.add(code));
            } else {
                selectedCodes.clear();
            }
            renderFileList();
        }

        function changePage(delta) {
            currentPage += delta;
            renderFileList();
            document.querySelector('.file-list-scroll').scrollTop = 0;
        }

        function filterFiles() {
            const q = document.getElementById('admin-search').value.toLowerCase();
            const minVal = parseFloat(document.getElementById('size-min').value);
            const maxVal = parseFloat(document.getElementById('size-max').value);
            const minUnit = document.getElementById('size-min-unit').value;
            const maxUnit = document.getElementById('size-max-unit').value;
            
            const getBytes = (val, unit) => {
                if (isNaN(val)) return null;
                let multiplier = 1024;
                if (unit === 'MB') multiplier = 1024 * 1024;
                if (unit === 'GB') multiplier = 1024 * 1024 * 1024;
                return val * multiplier;
            };

            const minBytes = getBytes(minVal, minUnit) ?? 0;
            const maxBytes = getBytes(maxVal, maxUnit) ?? Infinity;

            filteredFiles = {};
            for (const [code, info] of Object.entries(allFiles)) {
                const nameMatch = info.name.toLowerCase().includes(q) || code.toLowerCase().includes(q);
                const size = info.size || 0;
                const sizeMatch = size >= minBytes && size <= maxBytes;
                if (nameMatch && sizeMatch) { filteredFiles[code] = info; }
            }
            currentPage = 1;
            selectedCodes.clear(); // Reset pilihan bila carian berubah
            renderFileList();
        }

        function updateSelectedCount() {
            const totalFiltered = Object.keys(filteredFiles).length;
            const selectedCount = selectedCodes.size;
            const pageTotal = document.querySelectorAll('.file-check').length;
            const pageChecked = document.querySelectorAll('.file-check:checked').length;

            const banner = document.getElementById('global-select-banner');
            const msg = document.getElementById('global-selected-msg');
            const countLabel = document.getElementById('selected-count');

            if (pageChecked === pageTotal && pageTotal > 0 && selectedCount < totalFiltered && totalFiltered > PAGE_SIZE) {
                banner.style.display = 'block';
                document.getElementById('page-count-text').innerText = pageTotal;
                document.getElementById('total-filtered-count').innerText = totalFiltered;
            } else {
                banner.style.display = 'none';
            }

            if (selectedCount === totalFiltered && totalFiltered > PAGE_SIZE) {
                msg.style.display = 'block';
                document.getElementById('global-count-text').innerText = totalFiltered;
            } else {
                msg.style.display = 'none';
            }

            countLabel.innerText = `${selectedCount.toLocaleString()} files selected`;
        }

        function showDeleteConfirm() {
            if (selectedCodes.size === 0) return;
            document.getElementById('delete-msg').innerText = `Permanently delete ${selectedCodes.size.toLocaleString()} selected files?`;
            document.getElementById('delete-confirm-modal').style.display = 'flex';
        }

        function closeDeleteConfirm() { document.getElementById('delete-confirm-modal').style.display = 'none'; }

        async function deleteSelected() {
            const selectedArray = Array.from(selectedCodes);
            closeDeleteConfirm();
            const res = await fetch('/admin/delete', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ password: adminPass, filenames: selectedArray }) 
            });
            if (res.ok) { 
                selectedCodes.clear();
                document.getElementById('select-all').checked = false;
                loadAdminData(); 
            } else { 
                alert('Delete failed'); 
            }
        }

        // Upload Logic
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const statusText = document.getElementById('status-text');
        const resultDiv = document.getElementById('result');
        const downloadUrl = document.getElementById('download-url');
        const progressBar = document.getElementById('progress-bar-el');
        
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { if (e.target.files.length > 0) uploadFile(e.target.files[0]); };
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragging'); };
        dropZone.ondragleave = () => { dropZone.classList.remove('dragging'); };
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragging'); if (e.dataTransfer.files.length > 0) uploadFile(e.dataTransfer.files[0]); };
        
        function showError(msg) {
            document.getElementById('error-msg').innerText = msg;
            document.getElementById('error-modal').style.display = 'flex';
        }

        const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB chunks

        const percentText = document.getElementById('percent-text');
        const sizeText = document.getElementById('size-text');

        function uploadFile(file) {
            percentText.style.display = 'block';
            sizeText.style.display = 'block';
            percentText.innerText = '0%';
            sizeText.innerText = `0MB / ${(file.size / 1024 / 1024).toFixed(2)}MB`;
            if (file.size <= CHUNK_SIZE) {
                performRegularUpload(file);
            } else {
                performChunkedUpload(file);
            }
        }

        function performRegularUpload(file) {
            const formData = new FormData(); formData.append('file', file);
            statusText.innerText = 'Uploading ' + file.name + '...';
            progressBar.style.width = '0%'; resultDiv.style.display = 'none';
            const xhr = new XMLHttpRequest(); xhr.open('POST', '/api/upload', true);
            xhr.upload.onprogress = (e) => { 
                if (e.lengthComputable) { 
                    const percent = Math.round((e.loaded / e.total) * 100); 
                    progressBar.style.width = percent + '%'; 
                    percentText.innerText = percent + '%';
                    const currentMB = (e.loaded / 1024 / 1024).toFixed(2);
                    const totalMB = (e.total / 1024 / 1024).toFixed(2);
                    sizeText.innerText = `${currentMB}MB / ${totalMB}MB`;
                } 
            };
            xhr.onload = () => {
                try {
                    const response = JSON.parse(xhr.responseText);
                    if (xhr.status === 200) { 
                        statusText.innerText = 'Upload Complete'; 
                        downloadUrl.innerText = response.url; 
                        resultDiv.style.display = 'block'; 
                        progressBar.style.width = '0%'; 
                        percentText.style.display = 'none';
                        sizeText.style.display = 'none';
                    } else { 
                        statusText.innerText = 'Upload Failed'; 
                        showError(response.detail || 'Server error occurred'); 
                        percentText.style.display = 'none';
                        sizeText.style.display = 'none';
                    }
                } catch(e) { 
                    statusText.innerText = 'Upload Failed'; 
                    showError('Invalid server response'); 
                    percentText.style.display = 'none';
                    sizeText.style.display = 'none';
                }
            };
            xhr.onerror = () => { statusText.innerText = 'Upload Failed'; showError('Network connection error'); percentText.style.display = 'none'; sizeText.style.display = 'none'; };
            xhr.send(formData);
        }

        async function performChunkedUpload(file) {
            const uploadId = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            statusText.innerText = `Preparing large upload (${totalChunks} parts)...`;
            progressBar.style.width = '0%'; resultDiv.style.display = 'none';

            try {
                let lastResult = null;
                for (let i = 0; i < totalChunks; i++) {
                    const start = i * CHUNK_SIZE;
                    const end = Math.min(start + CHUNK_SIZE, file.size);
                    const chunk = file.slice(start, end);
                    statusText.innerText = `Uploading part ${i + 1} of ${totalChunks}...`;
                    const response = await uploadChunk(chunk, i, totalChunks, uploadId, file.name, (loadedInChunk) => {
                        const totalLoaded = (i * CHUNK_SIZE) + loadedInChunk;
                        const percent = Math.min(Math.round((totalLoaded / file.size) * 100), 99);
                        progressBar.style.width = percent + '%';
                        percentText.innerText = percent + '%';
                        const currentMB = (totalLoaded / 1024 / 1024).toFixed(2);
                        const totalMB = (file.size / 1024 / 1024).toFixed(2);
                        sizeText.innerText = `${currentMB}MB / ${totalMB}MB`;
                    });
                    if (!response.success) throw new Error(`Failed to upload chunk ${i + 1}`);
                    lastResult = response.data;
                }
                if (lastResult && lastResult.url) {
                    progressBar.style.width = '100%';
                    percentText.innerText = '100%';
                    const totalMB = (file.size / 1024 / 1024).toFixed(2);
                    sizeText.innerText = `${totalMB}MB / ${totalMB}MB`;
                    statusText.innerText = 'Upload Complete';
                    downloadUrl.innerText = lastResult.url;
                    resultDiv.style.display = 'block';
                    setTimeout(() => {
                        progressBar.style.width = '0%';
                        percentText.style.display = 'none';
                        sizeText.style.display = 'none';
                    }, 1000);
                } else { throw new Error('Finalization failed'); }
            } catch (error) {
                statusText.innerText = 'Upload Failed';
                showError(error.message);
                progressBar.style.width = '0%';
                percentText.style.display = 'none';
                sizeText.style.display = 'none';
            }
        }

        function uploadChunk(chunk, index, totalChunks, uploadId, filename, onProgress) {
            return new Promise((resolve) => {
                const formData = new FormData();
                formData.append('file', chunk, filename);
                formData.append('chunk_index', index);
                formData.append('total_chunks', totalChunks);
                formData.append('upload_id', uploadId);
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/upload', true);
                xhr.upload.onprogress = (e) => { if (e.lengthComputable && onProgress) { onProgress(e.loaded); } };
                xhr.onload = () => {
                    try {
                        const data = JSON.parse(xhr.responseText);
                        resolve({ success: xhr.status === 200, data: data });
                    } catch (e) { resolve({ success: false }); }
                };
                xhr.onerror = () => resolve({ success: false });
                xhr.send(formData);
            });
        }
        function copyUrl() {
            const text = downloadUrl.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn'); const originalText = btn.innerText;
                btn.innerText = 'COPIED!'; setTimeout(() => btn.innerText = originalText, 2000);
            });
        }
    </script>
